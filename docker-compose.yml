version: "3.9"

services:
  api:
    build: .
    container_name: nutrielite_api
    ports:
      - "8000:8080"
    volumes:
      - .:/app
    restart: always

  db:
    image: postgres:15
    container_name: nutrielite_db
    environment:
      POSTGRES_DB: nutrielite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
