version: "3.9"

services:
  api:
    build: .
    container_name: nutrielite_api
    ports:
      - "8000:8080"
    volumes:
      - .:/app
    restart: always
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - STRIPE_API_KEY=${STRIPE_API_KEY}
      - STRIPE_PRICE_ID=${STRIPE_PRICE_ID}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/nutrielite

  db:
    image: postgres:15
    container_name: nutrielite_db
    environment:
      POSTGRES_DB: nutrielite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
