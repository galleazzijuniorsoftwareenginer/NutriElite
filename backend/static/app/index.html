<!DOCTYPE html>

<html>

<head>
<meta charset="UTF-8">
<title>NutriElite SaaS Demo</title>

<style>

body{
font-family:Arial;
background:#f5f7fa;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:35px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

.step{
border-left:4px solid #2c7be5;
padding-left:15px;
margin-bottom:25px;
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:10px;
}

button{
padding:12px;
background:#2c7be5;
color:white;
border:none;
cursor:pointer;
width:100%;
}

.result{
background:#f0f2f5;
padding:15px;
margin-top:20px;
}

.token{
background:#eef3ff;
padding:10px;
font-size:12px;
word-break:break-all;
}

</style>

</head>

<body>

<div class="container">

<h1>NutriElite API Demo</h1>

<p>This interface demonstrates the workflow of the NutriElite SaaS backend.</p>

<div class="step">

<h3>1️⃣ Register User</h3>

<input id="reg_user" placeholder="username">
<input id="reg_pass" type="password" placeholder="password">

<button onclick="register()">Register</button>

</div>

<div class="step">

<h3>2️⃣ Login → Generate JWT Token</h3>

<input id="login_user" placeholder="username">
<input id="login_pass" type="password" placeholder="password">

<button onclick="login()">Login</button>

<div id="tokenBox" class="token"></div>

</div>

<div class="step">

<h3>3️⃣ Generate Nutrition Plan</h3>

<input id="name" placeholder="Patient Name">
<input id="email" placeholder="Patient Email">
<input id="phone" placeholder="Patient Phone">

<input id="weight" placeholder="Weight (kg)">
<input id="height" placeholder="Height (cm)">
<input id="age" placeholder="Age">

<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<select id="activity">
<option value="1.2">Sedentary</option>
<option value="1.375">Light</option>
<option value="1.55">Moderate</option>
<option value="1.725">Active</option>
<option value="1.9">Very Active</option>
</select>

<select id="goal">
<option value="cut">Cut</option>
<option value="maintenance">Maintenance</option>
<option value="bulk">Bulk</option>
</select>

<select id="formula">
<option value="mifflin">Mifflin</option>
<option value="harris">Harris Benedict</option>
<option value="schofield">Schofield</option>
</select>

<button onclick="generatePlan()">Generate Plan</button>

</div>

<div id="results" class="result"></div>

<div class="step">

<h3>4️⃣ Energy Audit</h3>

<button onclick="viewAudit()">View Energy Audit</button>

</div>

<div class="step">

<h3>5️⃣ Export Clinical PDF</h3>

<button onclick="downloadPDF()">Download Plan PDF</button>

</div>

</div>

<script>

const API = window.location.origin

let token = null
let planId = null

async function register(){

await fetch(API + "/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username:document.getElementById("reg_user").value,
password:document.getElementById("reg_pass").value
})

})

alert("User registered successfully")

}

async function login(){

const res = await fetch("http://127.0.0.1:8000/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username:document.getElementById("login_user").value,
password:document.getElementById("login_pass").value
})

})

const text = await res.text()

console.log("RAW RESPONSE:", text)

const data = JSON.parse(text)

token = data.access_token

document.getElementById("tokenBox").innerHTML =
"<strong>JWT Token:</strong><br>" + token

}

async function generatePlan(){

const res = await fetch(API + "/plan",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + token
},

body:JSON.stringify({

patient_name:document.getElementById("name").value,
patient_email:document.getElementById("email").value,
patient_phone:document.getElementById("phone").value,

weight:parseFloat(document.getElementById("weight").value),
height:parseFloat(document.getElementById("height").value),
age:parseInt(document.getElementById("age").value),

gender:document.getElementById("gender").value,
activity_level:parseFloat(document.getElementById("activity").value),

goal:document.getElementById("goal").value,
formula:document.getElementById("formula").value

})

})

const data = await res.json()

planId = data.plan_id

document.getElementById("results").innerHTML =
"<h2>Plan Generated</h2>" +
"Plan ID: " + planId + "<br>" +
"TMB: " + data.TMB + " kcal<br>" +
"GET: " + data.GET + " kcal<br>"

}

async function viewAudit(){

if(!planId){
alert("Generate a plan first")
return
}

const res = await fetch(API + "/plans/" + planId + "/audit",{

headers:{
"Authorization":"Bearer " + token
}

})

const data = await res.json()

document.getElementById("results").innerHTML +=
"<hr><h3>Energy Audit</h3>" +
"GET Planned: " + data.energy_validation.get_planned + "<br>" +
"Kcal From Macros: " + data.energy_validation.kcal_from_macros

}

function downloadPDF(){

if(!planId){
alert("Generate a plan first")
return
}

window.open(API + "/plans/" + planId + "/pdf")

}

</script>

</body>
</html>
