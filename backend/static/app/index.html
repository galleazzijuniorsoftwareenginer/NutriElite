<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>NutriElite SaaS</title>

<style>

body{
font-family:Arial;
background:#f5f7fa;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:35px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ddd;
border-radius:6px;
}

button{
padding:10px 15px;
background:#4CAF50;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#43a047;
}

</style>

</head>

<body>

<div class="container">

<h2>NutriElite</h2>

<h3>Register</h3>

<input id="reg_email" placeholder="email">
<input id="reg_password" placeholder="password" type="password">

<button onclick="register()">Register</button>

<hr>

<h3>Login</h3>

<input id="login_email" placeholder="email">
<input id="login_password" placeholder="password" type="password">

<button onclick="login()">Login</button>

<hr>

<h3>Generate Plan</h3>

<input id="name" placeholder="Patient Name">
<input id="weight" placeholder="Weight">
<input id="height" placeholder="Height">
<input id="age" placeholder="Age">

<button onclick="generatePlan()">Generate Plan</button>

<hr>

<h3>PDF</h3>

<input id="plan_id" placeholder="Plan ID">

<button onclick="downloadPDF()">Download PDF</button>

</div>


<script>

const API = "https://nutrielite-production-e88f.up.railway.app"

let token = null


// REGISTER
async function register(){

const res = await fetch(API + "/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:document.getElementById("reg_email").value,
password:document.getElementById("reg_password").value

})

})

const data = await res.json()

alert(JSON.stringify(data))

}



// LOGIN
async function login(){

const res = await fetch(API + "/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:document.getElementById("login_email").value,
password:document.getElementById("login_password").value

})

})

const data = await res.json()

token = data.access_token

alert("Login successful")

}



// GENERATE PLAN
async function generatePlan(){

const res = await fetch(API + "/plan",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + token
},

body:JSON.stringify({

patient_name:document.getElementById("name").value,
weight:parseFloat(document.getElementById("weight").value),
height:parseFloat(document.getElementById("height").value),
age:parseInt(document.getElementById("age").value)

})

})

const data = await res.json()

alert("Plan created: " + data.plan_id)

}



// DOWNLOAD PDF
function downloadPDF(){

const id = document.getElementById("plan_id").value

window.open(API + "/plans/" + id + "/pdf")

}

</script>

</body>
</html>
